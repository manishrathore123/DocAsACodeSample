name: Confluence Documentation Sync

on:
  push:
    branches:
      - main # Or your main branch name, e.g., 'master', 'production'
    paths:
      - 'docs/**' # Trigger this workflow ONLY when changes occur within the 'docs' folder
      - '.github/scripts/sync_confluence.py' # Also trigger if the script itself changes

jobs:
  sync_to_confluence:
    runs-on: ubuntu-latest # The virtual environment to run the action on

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 Action to check out your repository code

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0 Action to set up a Python environment
        with:
          python-version: '3.x' # Use the latest Python 3.x available or specify '3.9', '3.10', etc.

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install atlassian-python-api markdown # Install the required Python libraries

      - name: Run Confluence synchronization script
        run: python .github/scripts/sync_confluence.py # Execute your Python script
        env:
          # Pass Confluence credentials and settings as environment variables from GitHub Secrets
          CONFLUENCE_URL: ${{ secrets.CONFLUENCE_URL }}
          CONFLUENCE_USERNAME: ${{ secrets.CONFLUENCE_USERNAME }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY }}
          CONFLUENCE_PARENT_PAGE_ID: ${{ secrets.CONFLUENCE_PARENT_PAGE_ID }}
          CONFLUENCE_ARCHIVE_PARENT_PAGE_ID: ${{ secrets.CONFLUENCE_ARCHIVE_PARENT_PAGE_ID }}
